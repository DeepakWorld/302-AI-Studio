apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-studio-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: ai-studio.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-studio-service
            port:
              number: 80

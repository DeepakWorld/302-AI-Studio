name: Deploy AI Studio to AKS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ENDPOINT: ${{ secrets.OPENAI_ENDPOINT }}
      COSMOS_DB_URI: ${{ secrets.COSMOS_DB_URI }}
      COSMOS_DB_KEY: ${{ secrets.COSMOS_DB_KEY }}
      AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
      AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
      AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
      AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
      AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.ACR_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image ai-studio:latest \
            .

      - name: Get AKS credentials
        run: az aks get-credentials --name $AKS_CLUSTER_NAME --resource-group $AKS_RESOURCE_GROUP --overwrite-existing

      - name: Create Kubernetes secrets
        run: |
          kubectl delete secret ai-studio-secrets --ignore-not-found
          kubectl create secret generic ai-studio-secrets \
            --from-literal=OPENAI_API_KEY=$OPENAI_API_KEY \
            --from-literal=OPENAI_ENDPOINT=$OPENAI_ENDPOINT \
            --from-literal=COSMOS_DB_URI=$COSMOS_DB_URI \
            --from-literal=COSMOS_DB_KEY=$COSMOS_DB_KEY \
            --from-literal=AZURE_STORAGE_ACCOUNT=$AZURE_STORAGE_ACCOUNT \
            --from-literal=AZURE_STORAGE_KEY=$AZURE_STORAGE_KEY \
            --from-literal=AZURE_STORAGE_CONTAINER=$AZURE_STORAGE_CONTAINER

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
